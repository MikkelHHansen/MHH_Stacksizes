[mod-setting-description]
mhh-stacksize-raw-materials=Stack size for raw materials like ores, coal, stone, wood, and modded ores (cryonite, vulcanite, etc.).
mhh-stacksize-plates=Stack size for plates and basic processed materials (iron plate, copper plate, steel plate, etc.).
mhh-stacksize-ingots=Stack size for ingots (SE iron-ingot, beryllium-ingot, etc.).
mhh-stacksize-intermediates=Stack size for intermediate products like circuits, gears, engines, sulfates, rods, crystals, and other crafted components.
mhh-stacksize-science=Stack size for all science packs (vanilla, Space Exploration, Krastorio 2).
mhh-stacksize-barrels=Stack size for fluid barrels.
mhh-stacksize-fuel-burner=Stack size for burner fuel (coal, solid fuel, biomass, coke, etc.).
mhh-stacksize-fuel-advanced=Stack size for advanced fuel (nuclear fuel cells, antimatter fuel, fusion fuel, etc.).
mhh-stacksize-ammo-basic=Stack size for basic ammo (magazines, shotgun shells).
mhh-stacksize-ammo-advanced=Stack size for advanced ammo (rockets, cannon shells, artillery shells, etc.).
mhh-stacksize-ammo-capsule=Stack size for capsules (grenades, combat robots, medkits).
mhh-stacksize-modules=Stack size for all modules (speed, productivity, efficiency, quality).
mhh-stacksize-rocket-parts=Stack size for rocket parts (cargo pods, fuel tanks, rocket sections).
mhh-stacksize-data=Stack size for data items (SE data cards, catalogues, insights, telemetry).
