[mod-setting-description]
mhh-stacksize-raw-materials=Stack size for raw materials like ores, coal, stone, wood, and modded ores (cryonite, vitamelange, vulcanite, etc.). Does not apply to buildings or equipment.
mhh-stacksize-plates=Stack size for plates and basic processed materials (iron plate, copper plate, steel plate, etc.).
mhh-stacksize-ingots=Stack size for ingots from vanilla and modded content (SE iron-ingot, beryllium-ingot, etc.).
mhh-stacksize-intermediates=Stack size for intermediate products like circuits, gears, engines, powders, and other crafted components.
mhh-stacksize-science=Stack size for all science packs (research items).
mhh-stacksize-barrels=Stack size for fluid barrels.
mhh-stacksize-fuel=Stack size for fuel items (coal, solid fuel, rocket fuel, nuclear fuel, etc.).
mhh-stacksize-ammo=Stack size for all ammunition types (magazines, shells, rockets, etc.).
mhh-stacksize-modules=Stack size for all modules (speed, productivity, efficiency, quality).
mhh-stacksize-rocket-parts=Stack size for rocket parts (cargo pods, fuel tanks, rocket sections).
mhh-stacksize-other=Default stack size for all other items that don't fit in the above categories.
